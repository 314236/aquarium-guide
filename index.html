<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にっぽん水族館めぐり｜47都道府県の水族館ガイド</title>
<meta name="description" content="北海道から沖縄まで、地方→都道府県の順にたどって全国の水族館を探せるガイド。料金のめやす・アクセス・見どころをコンパクトに紹介します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#122f3a;
  --tide:#136f85;
  --tide-dark:#0c4f60;
  --foam:#eaf4f3;
  --goldfish:#e0552b;
  --sand:#f7efdc;
  --sand-line:#d9bd8c;
  --line:#cfe2e0;
  --card:#ffffff;
  --muted:#5a7480;
  --radius:18px;
  --shadow:0 10px 30px rgba(18,47,58,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--foam);
  background-image:radial-gradient(rgba(19,111,133,.05) 1.5px, transparent 1.6px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN',system-ui,sans-serif;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit}

/* ---------- ヒーロー（水中） ---------- */
.hero{
  position:relative;
  background:linear-gradient(180deg,#0a2833 0%,#0d3d4e 52%,#136f85 100%);
  color:#f2fbfa;
  overflow:hidden;
  padding:72px 24px 120px;
}
.hero-inner{max-width:1040px;margin:0 auto;position:relative;z-index:3;display:flex;gap:30px;align-items:flex-start}
.tate{
  writing-mode:vertical-rl;
  font-family:'Zen Antique',serif;
  font-size:13px;letter-spacing:.4em;
  color:#cfeef0;
  border:1px solid rgba(207,238,240,.5);
  border-radius:999px;
  padding:16px 9px;
  flex:none;
}
.hero-main{min-width:0}
.site-title{
  font-family:'Zen Antique',serif;font-weight:400;
  font-size:clamp(34px,6vw,58px);
  margin:0 0 12px;letter-spacing:.06em;line-height:1.25;
  text-shadow:0 2px 18px rgba(0,0,0,.25);
}
.hero-lead{max-width:600px;margin:0 0 28px;color:#cfe9ea;font-size:15px}
.searchbar{display:flex;max-width:540px;background:#fff;border-radius:999px;padding:5px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.searchbar input{
  flex:1;min-width:0;border:none;outline:none;background:none;
  font:inherit;font-size:14.5px;color:var(--ink);padding:9px 16px;
}
.searchbar input::placeholder{color:#9ab3ba}
.searchbar button{
  border:none;border-radius:999px;background:var(--tide-dark);color:#fff;
  font-weight:700;font-size:13.5px;padding:9px 22px;cursor:pointer;flex:none;
}
.searchbar button:hover{background:var(--goldfish)}
.hero-stats{display:flex;gap:26px;margin-top:30px;flex-wrap:wrap}
.hero-stats div{font-size:12px;color:#a9d4d6;letter-spacing:.1em}
.hero-stats b{display:block;font-family:'Zen Antique',serif;font-weight:400;font-size:26px;color:#fff;letter-spacing:.04em}

/* 回遊する魚のシルエット */
.fishline{position:absolute;left:0;display:flex;gap:110px;width:max-content;z-index:1;pointer-events:none}
.fishline svg{height:auto;fill:#bfeef0}
.f1{top:24%;opacity:.16;animation:swim 70s linear infinite}
.f1 svg{width:84px}
.f2{top:64%;opacity:.10;animation:swim 110s linear infinite reverse}
.f2 svg{width:52px;transform:scaleX(-1)}
@keyframes swim{from{transform:translateX(100vw)}to{transform:translateX(-110%)}}
.wave{position:absolute;left:0;bottom:-1px;width:100%;z-index:2;display:block}

/* ---------- パンくず ---------- */
#crumbs{
  position:sticky;top:0;z-index:50;
  background:rgba(234,244,243,.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.crumbs-inner{max-width:1040px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:6px;font-size:13.5px;flex-wrap:wrap}
.crumb-link{background:none;border:none;color:var(--tide);cursor:pointer;padding:4px 8px;border-radius:8px;font-weight:500}
.crumb-link:hover{background:#fff}
.crumb-now{font-weight:700;padding:4px 4px}
.crumb-sep{color:var(--muted)}

/* ---------- 本文共通 ---------- */
main{max-width:1040px;margin:0 auto;padding:44px 24px 90px}
.view{animation:rise .35s ease both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.section-label{font-family:'Zen Antique',serif;font-weight:400;font-size:clamp(22px,3.4vw,30px);margin:0 0 6px;letter-spacing:.04em}
.section-sub{color:var(--muted);font-size:14px;margin:0 0 28px}
.back-row{margin-top:36px;display:flex;gap:12px;flex-wrap:wrap}
.btn-back{
  background:#fff;border:1px solid var(--line);border-radius:999px;
  padding:9px 22px;cursor:pointer;color:var(--tide-dark);font-weight:700;font-size:13.5px;
  box-shadow:var(--shadow);
}
.btn-back:hover{border-color:var(--tide);color:var(--tide)}

/* ---------- 地方カード ---------- */
.grid-regions{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:16px;list-style:none;padding:0;margin:0}
.region-card{
  width:100%;text-align:left;cursor:pointer;
  background:var(--card);
  border:1px solid var(--line);
  border-top:6px solid var(--rc,#136f85);
  border-radius:var(--radius);
  padding:20px 20px 16px;
  box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease;
}
.region-card:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(18,47,58,.14)}
.region-name{font-family:'Zen Antique',serif;font-size:21px;letter-spacing:.04em}
.region-meta{font-size:12.5px;color:var(--muted);margin-top:8px;display:flex;gap:14px}
.region-meta b{color:var(--rc,#136f85);font-size:15px}

/* ---------- 都道府県ボタン ---------- */
.grid-prefs{display:grid;grid-template-columns:repeat(auto-fill,minmax(156px,1fr));gap:12px;list-style:none;padding:0;margin:0}
.pref-btn{
  width:100%;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--card);border:1px solid var(--line);border-left:5px solid var(--rc,#136f85);
  border-radius:14px;padding:13px 14px;font-weight:700;font-size:15px;
  box-shadow:var(--shadow);transition:transform .15s ease;
}
.pref-btn:hover{transform:translateY(-3px)}
.pref-count{
  flex:none;font-size:11.5px;font-weight:700;color:var(--tide-dark);
  background:#e3f1f0;border-radius:999px;padding:2px 9px;
}

/* ---------- 水族館カード（入館券スタイル） ---------- */
.pref-note{
  background:#fff;border-left:5px solid var(--tide);
  padding:12px 18px;border-radius:0 12px 12px 0;
  font-size:13.5px;color:#3c5a64;margin:0 0 24px;box-shadow:var(--shadow);
}
.aq-list{display:flex;flex-direction:column;gap:24px;list-style:none;padding:0;margin:0}
.aq-card{
  display:grid;grid-template-columns:1fr 234px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);position:relative;
}
.aq-main{padding:24px 26px;min-width:0}
.aq-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.aq-name{font-family:'Zen Antique',serif;font-weight:400;font-size:22px;margin:0;letter-spacing:.03em}
.aq-city{font-size:12.5px;color:var(--muted)}
.aq-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 12px;padding:0;list-style:none}
.tag{font-size:11.5px;background:#e3f1f0;color:var(--tide-dark);border-radius:999px;padding:3px 11px;font-weight:500}
.aq-desc{margin:0 0 12px;font-size:14.5px}
.aq-alert{font-size:12.5px;color:#9a4a1f;background:#fdf0e7;border-radius:10px;padding:8px 13px;margin:0 0 12px}
.aq-rows{display:grid;gap:9px;font-size:13.5px}
.aq-row{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:start}
.aq-k{
  font-weight:700;color:var(--tide-dark);font-size:11.5px;letter-spacing:.18em;
  background:#eef6f5;border-radius:8px;text-align:center;padding:4px 0;margin-top:2px;
}
.points{margin:0;padding-left:18px}
.points li::marker{color:var(--goldfish)}
.aq-link{
  display:inline-block;margin-top:14px;font-size:13px;color:var(--tide);font-weight:700;
  text-decoration:none;border-bottom:1.5px dashed currentColor;padding-bottom:1px;
}
.aq-link:hover{color:var(--goldfish)}

/* 半券（料金スタブ） */
.aq-stub{
  background:var(--sand);
  border-left:2px dashed var(--sand-line);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:22px 18px;display:flex;flex-direction:column;gap:7px;position:relative;
}
.aq-stub::before,.aq-stub::after{
  content:"";position:absolute;left:-11px;width:20px;height:20px;border-radius:50%;
  background:var(--foam);border:1px solid var(--line);
}
.aq-stub::before{top:-11px}
.aq-stub::after{bottom:-11px}
.stub-label{font-size:10.5px;letter-spacing:.3em;color:#8a6b34;font-weight:700}
.stub-price{font-family:'Zen Antique',serif;font-size:16.5px;color:#4c3a14;line-height:1.7}
.stub-note{font-size:11.5px;color:#8a7a52;margin-top:auto}

/* ---------- 検索結果・空表示 ---------- */
.result-pref{font-size:12px;font-weight:700;color:#fff;background:var(--tide);border-radius:999px;padding:2px 11px}
.empty{padding:46px 24px;text-align:center;color:var(--muted);background:#fff;border-radius:var(--radius);border:1.5px dashed var(--line)}

/* ---------- フッター ---------- */
footer{background:var(--ink);color:#bcd6d8;padding:42px 24px 50px;font-size:12.5px;margin-top:20px}
.foot-inner{max-width:1040px;margin:0 auto;display:grid;gap:10px}
.foot-title{font-family:'Zen Antique',serif;color:#fff;font-size:17px;letter-spacing:.06em}

/* ---------- フォーカスとモーション ---------- */
.region-card:focus-visible,.pref-btn:focus-visible,.btn-back:focus-visible,
.crumb-link:focus-visible,.searchbar button:focus-visible,.aq-link:focus-visible{
  outline:3px solid var(--goldfish);outline-offset:2px;border-radius:12px;
}
.searchbar:focus-within{box-shadow:0 0 0 3px rgba(224,85,43,.45)}
@media (prefers-reduced-motion:reduce){
  .f1,.f2{animation:none}
  .view{animation:none}
  html{scroll-behavior:auto}
  .region-card,.pref-btn{transition:none}
}

/* ---------- レスポンシブ ---------- */
@media (max-width:680px){
  .hero{padding:52px 18px 100px}
  .hero-inner{flex-direction:column;gap:18px}
  .tate{writing-mode:horizontal-tb;padding:6px 16px;letter-spacing:.32em;align-self:flex-start}
  .aq-card{grid-template-columns:1fr}
  .aq-stub{
    border-left:none;border-top:2px dashed var(--sand-line);
    border-radius:0 0 var(--radius) var(--radius);
  }
  .aq-stub::before{top:-11px;left:-11px}
  .aq-stub::after{top:-11px;bottom:auto;left:auto;right:-11px}
  .aq-row{grid-template-columns:78px 1fr;gap:9px}
  main{padding:34px 18px 70px}
}
</style>

/* =========================================================
   以下、表示ロジック
   ========================================================= */
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
));

const app = document.getElementById("app");
const crumbsInner = document.getElementById("crumbsInner");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

/* 全施設のフラット索引（横断検索用） */
const ALL = [];
DATA.forEach(r => r.prefs.forEach(p => p.spots.forEach(s => ALL.push({ region: r, pref: p, spot: s }))));
document.getElementById("statSpots").textContent = ALL.length;

const byRegion = id => DATA.find(r => r.id === id) || null;
function findPref(id){
  for (const r of DATA){
    const p = r.prefs.find(x => x.id === id);
    if (p) return { region: r, pref: p };
  }
  return null;
}

/* ---------- 部品 ---------- */
function linkHTML(s){
  if (s.url){
    return '<a class="aq-link" href="' + esc(s.url) + '" target="_blank" rel="noopener noreferrer">公式サイトへ →</a>';
  }
  const q = encodeURIComponent(s.name + " 公式サイト");
  return '<a class="aq-link" href="https://www.google.com/search?q=' + q + '" target="_blank" rel="noopener noreferrer">公式サイトを検索 →</a>';
}

function cardHTML(item, withPrefBadge){
  const s = item.spot;
  const badge = withPrefBadge
    ? '<span class="result-pref" style="background:' + esc(item.region.color) + '">' + esc(item.pref.name) + '</span>'
    : "";
  const tags = (s.tags || []).map(t => '<li class="tag">' + esc(t) + '</li>').join("");
  const alert = s.alert ? '<p class="aq-alert">※ ' + esc(s.alert) + '</p>' : "";
  const points = (s.points || []).map(p => '<li>' + esc(p) + '</li>').join("");
  const note = s.note ? '<p class="stub-note">※ ' + esc(s.note) + '</p>' : "";
  return (
    '<li class="aq-card">' +
      '<div class="aq-main">' +
        '<div class="aq-head"><h3 class="aq-name">' + esc(s.name) + '</h3>' +
        '<span class="aq-city">' + esc(s.city) + '</span>' + badge + '</div>' +
        (tags ? '<ul class="aq-tags">' + tags + '</ul>' : "") +
        '<p class="aq-desc">' + esc(s.desc) + '</p>' +
        alert +
        '<div class="aq-rows">' +
          '<div class="aq-row"><span class="aq-k">アクセス</span><div>' + esc(s.access) + '</div></div>' +
          '<div class="aq-row"><span class="aq-k">みどころ</span><ul class="points">' + points + '</ul></div>' +
        '</div>' +
        linkHTML(s) +
      '</div>' +
      '<aside class="aq-stub">' +
        '<p class="stub-label">入館料のめやす</p>' +
        '<p class="stub-price">' + esc(s.price) + '</p>' +
        note +
      '</aside>' +
    '</li>'
  );
}

function backHTML(hash, label){
  return '<div class="back-row"><button type="button" class="btn-back" data-hash="' + esc(hash) + '">← ' + esc(label) + '</button></div>';
}

/* ---------- パンくず ---------- */
function setCrumbs(parts){
  crumbsInner.innerHTML = parts.map((p, i) => {
    const sep = i ? '<span class="crumb-sep">／</span>' : "";
    if (p.hash != null){
      return sep + '<button type="button" class="crumb-link" data-hash="' + esc(p.hash) + '">' + esc(p.label) + '</button>';
    }
    return sep + '<span class="crumb-now">' + esc(p.label) + '</span>';
  }).join("");
}

/* ---------- 各ビュー ---------- */
function renderRegions(){
  setCrumbs([{ label: "トップ", hash: null }]);
  const cards = DATA.map(r => {
    const spotCount = r.prefs.reduce((n, p) => n + p.spots.length, 0);
    return (
      '<li><button type="button" class="region-card" style="--rc:' + esc(r.color) + '" data-hash="r/' + esc(r.id) + '">' +
        '<div class="region-name">' + esc(r.region) + '</div>' +
        '<div class="region-meta"><span><b>' + r.prefs.length + '</b> 都道府県</span><span><b>' + spotCount + '</b> 施設</span></div>' +
      '</button></li>'
    );
  }).join("");
  app.innerHTML =
    '<section class="view">' +
      '<h2 class="section-label">地方からえらぶ</h2>' +
      '<p class="section-sub">まずはお住まいの地方、旅先の地方を選んでください。</p>' +
      '<ul class="grid-regions">' + cards + '</ul>' +
    '</section>';
}

function renderPrefs(region){
  setCrumbs([{ label: "トップ", hash: "" }, { label: region.region, hash: null }]);
  const btns = region.prefs.map(p =>
    '<li><button type="button" class="pref-btn" style="--rc:' + esc(region.color) + '" data-hash="p/' + esc(p.id) + '">' +
      '<span>' + esc(p.name) + '</span><span class="pref-count">' + p.spots.length + '館</span>' +
    '</button></li>'
  ).join("");
  app.innerHTML =
    '<section class="view">' +
      backHTML("", "地方の一覧へもどる") +
      '<h2 class="section-label">' + esc(region.region) + '</h2>' +
      '<p class="section-sub">都道府県を選ぶと、水族館の紹介が表示されます。</p>' +
      '<ul class="grid-prefs">' + btns + '</ul>' +
    '</section>';
}

function renderPref(region, pref){
  setCrumbs([
    { label: "トップ", hash: "" },
    { label: region.region, hash: "r/" + region.id },
    { label: pref.name, hash: null }
  ]);
  const note = pref.note ? '<p class="pref-note">' + esc(pref.note) + '</p>' : "";
  const cards = pref.spots.map(s => cardHTML({ region: region, pref: pref, spot: s }, false)).join("");
  app.innerHTML =
    '<section class="view">' +
      backHTML("r/" + region.id, region.region + "の県一覧へもどる") +
      '<h2 class="section-label">' + esc(pref.name) + 'の水族館</h2>' +
      note +
      '<ul class="aq-list">' + cards + '</ul>' +
    '</section>';
}

function renderSearch(q){
  setCrumbs([{ label: "トップ", hash: "" }, { label: '検索結果「' + q + '」', hash: null }]);
  const key = q.toLowerCase();
  const hits = ALL.filter(it => {
    const s = it.spot;
    const hay = [s.name, s.city, s.desc, s.price, s.access, it.pref.name, it.region.region]
      .concat(s.tags || [], s.points || [])
      .join(" ").toLowerCase();
    return hay.indexOf(key) !== -1;
  });
  const body = hits.length
    ? '<ul class="aq-list">' + hits.map(it => cardHTML(it, true)).join("") + '</ul>'
    : '<div class="empty">「' + esc(q) + '」に合う水族館が見つかりませんでした。<br>施設名・県名・「ジンベエザメ」「ふれあい」などのキーワードでお試しください。</div>';
  app.innerHTML =
    '<section class="view">' +
      backHTML("", "地方の一覧へもどる") +
      '<h2 class="section-label">検索結果</h2>' +
      '<p class="section-sub">「' + esc(q) + '」に ' + hits.length + ' 件の施設が見つかりました。</p>' +
      body +
    '</section>';
}

/* ---------- ルーティング ---------- */
let booted = false;
function route(){
  const h = decodeURIComponent(location.hash.replace(/^#/, ""));
  if (h.indexOf("p/") === 0){
    const hit = findPref(h.slice(2));
    if (hit){ renderPref(hit.region, hit.pref); afterRender(); return; }
  } else if (h.indexOf("r/") === 0){
    const r = byRegion(h.slice(2));
    if (r){ renderPrefs(r); afterRender(); return; }
  }
  renderRegions();
  afterRender();
}
function afterRender(){
  if (booted) window.scrollTo({ top: 0, behavior: "smooth" });
  booted = true;
}
function go(hash){
  if (("#" + hash === location.hash) || (hash === "" && !location.hash)){ route(); return; }
  location.hash = hash;
}

/* ---------- イベント ---------- */
document.addEventListener("click", e => {
  const t = e.target.closest("[data-hash]");
  if (!t) return;
  searchInput.value = "";
  go(t.getAttribute("data-hash"));
});
function doSearch(){
  const q = searchInput.value.trim();
  if (!q){ route(); return; }
  renderSearch(q);
  afterRender();
}
searchBtn.addEventListener("click", doSearch);
searchInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
searchInput.addEventListener("input", () => { if (!searchInput.value.trim()) route(); });
window.addEventListener("hashchange", route);

route();
</script>
